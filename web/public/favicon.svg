<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#11221c"/>
      <stop offset="100%" stop-color="#070808"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="45%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="55%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark rounded tile -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="7" fill="none" stroke="#1f2a26" stroke-width="1"/>

  <!-- the metabolic loop: a glowing ring with an opening, rotated so the gap sits top-right -->
  <g transform="rotate(-108 16 16)" filter="url(#glow)">
    <circle cx="16" cy="16" r="9" fill="none" stroke="url(#ring)"
            stroke-width="2.6" stroke-linecap="round"
            stroke-dasharray="45 12.5"/>
    <!-- leading node, suggesting cyclic motion -->
    <circle cx="25" cy="16" r="2.1" fill="#a7f3d0"/>
  </g>

  <!-- luminous organism core -->
  <circle cx="16" cy="16" r="3.3" fill="url(#core)"/>
  <circle cx="16" cy="16" r="3.3" fill="none" stroke="#ecfdf5" stroke-width="0.4" opacity="0.6"/>
</svg>
